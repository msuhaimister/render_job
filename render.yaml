services:
  - type: cron
    name: wallet-pipeline-high-freq
    runtime: node
    region: frankfurt
    schedule: "*/5 * * * *"
    buildCommand: npm install pg
    startCommand: node resources/jobs/run-wallet-pipeline-high-freq.js
    envVars:
      - fromGroup: default

  - type: cron
    name: wallet-pipeline-mid-freq
    runtime: node
    region: frankfurt
    schedule: "*/15 * * * *"
    buildCommand: npm install pg
    startCommand: node resources/jobs/run-wallet-pipeline-mid-freq.js
    envVars:
      - fromGroup: default

  - type: cron
    name: wallet-quality-snapshot
    runtime: node
    region: frankfurt
    schedule: "*/15 * * * *"
    buildCommand: npm install pg
    startCommand: node resources/jobs/run-wallet-quality-snapshot.js
    envVars:
      - fromGroup: default

  - type: cron
    name: wallet-pipeline-low-freq
    runtime: node
    region: frankfurt
    schedule: "5 1 * * *"
    buildCommand: npm install pg
    startCommand: node resources/jobs/run-wallet-pipeline-low-freq.js
    envVars:
      - fromGroup: default

  - type: cron
    name: trade-ledger-incremental
    runtime: node
    region: frankfurt
    schedule: "* * * * *"
    buildCommand: npm install pg
    startCommand: node resources/jobs/run-trade-ledger-incremental.js
    envVars:
      - fromGroup: default

  - type: cron
    name: partition-maintenance-7d
    runtime: node
    region: frankfurt
    schedule: "10 0 * * *"
    buildCommand: npm install pg
    startCommand: node resources/jobs/run-partition-maintenance-7d.js
    envVars:
      - fromGroup: default
